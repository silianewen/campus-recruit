<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校招平台 · Campus Recruit</title>
    <!-- Theme bootstrap: read localStorage / OS preference and apply `dark`
         class to <html> before React mounts to prevent flash-of-wrong-theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var t = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (_) { /* localStorage unavailable — stay in light */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
